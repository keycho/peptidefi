[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

# Cluster targets. Anchor's `--provider.cluster <X>` flag selects which
# `programs.<X>` entry to use; that entry must match the program ID
# embedded in the compiled binary via declare_id!() in lib.rs. The
# binary as-shipped here targets mainnet — the localnet / devnet entries
# are placeholders for local-only testing and would require updating
# declare_id!() before re-deploying to those clusters.

[programs.localnet]
biohash_peg = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"

[programs.devnet]
biohash_peg = "DAgK6HKtGRt8LFwxhypuEJ225JEhtjiCG3TrcdJmtW4r"

[programs.mainnet]
biohash_peg = "2cKMtgXPQt1zT8aWzBAh9LkH3Cf11ris6NDBjrq9J8s7"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

# Tests run against `solana-test-validator` started by `anchor test`.
# `anchor test` defaults to localnet — for devnet override:
#   anchor test --provider.cluster devnet
[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.test.json -t 1000000 'tests/**/*.ts'"

[test.validator]
url = "https://api.devnet.solana.com"
